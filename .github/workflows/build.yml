name: Build CDNSpeedTest

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  windows:
    strategy:
      matrix:
        arch: [x86, x86_64]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: ${{ matrix.arch == 'x86' && 'x86' || 'x64' }}
      - run: pip install -r requirements.txt pyinstaller
      - run: python gen_icon.py
      - run: python build.py
      - uses: actions/upload-artifact@v4
        with:
          name: CDNSpeedTest_Windows_${{ matrix.arch }}
          path: dist/CDNSpeedTest_${{ matrix.arch }}.exe

  macos:
    strategy:
      matrix:
        arch: [arm64]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt pyinstaller
      - run: python gen_icon.py
      - run: python build.py --arch arm64
      - uses: actions/upload-artifact@v4
        with:
          name: CDNSpeedTest_macOS_arm64
          path: dist/CDNSpeedTest_arm64

  linux:
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt pyinstaller
      - run: python gen_icon.py
      - run: python build.py
      - run: if [ "${{ matrix.arch }}" = "aarch64" ]; then mv dist/CDNSpeedTest_arm64 dist/CDNSpeedTest_aarch64; fi
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: CDNSpeedTest_Linux_${{ matrix.arch }}
          path: dist/CDNSpeedTest_${{ matrix.arch }}

  android:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      # Host Python must match the p4a target Python (3.11, pinned via
      # p4a.branch=v2024.01.21 in buildozer.spec). Newer p4a (master) targets
      # Python 3.14, whose C API breaks Kivy's pre-generated Cython sources.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install buildozer
        run: |
          sudo apt update
          sudo apt install -y python3-pip openjdk-17-jdk autoconf automake cmake \
            libtool libltdl-dev pkg-config libssl-dev libffi-dev python3-dev zlib1g-dev
          # Cython 0.29.19 is the version p4a v2024.01.21 is validated against
          # (per its Dockerfile). Cython 3.x reorders cythonize vs compile in the
          # CythonRecipe, causing "no such file or directory: *.c" clang failures.
          pip install --user buildozer==1.5.0 "cython==0.29.19"
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Build APK
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          java -version
          cd android
          buildozer android debug
      - uses: actions/upload-artifact@v4
        with:
          name: CDNSpeedTest_Android
          path: android/bin/*.apk

  release:
    needs: [windows, macos, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: CDNSpeedTest_*
          merge-multiple: true
          path: release/
      - run: ls -la release/
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
