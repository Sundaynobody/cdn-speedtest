name: Build CDNSpeedTest

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  windows:
    strategy:
      matrix:
        arch: [x86_64, arm64]
    runs-on: ${{ matrix.arch == 'arm64' && 'windows-arm64' || 'windows-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt pyinstaller
      - run: python gen_icon.py
      - run: python build.py
      - uses: actions/upload-artifact@v4
        with:
          name: CDNSpeedTest_Windows_${{ matrix.arch }}
          path: dist/CDNSpeedTest_${{ matrix.arch }}.exe

  macos:
    strategy:
      matrix:
        arch: [x86_64, arm64]
    runs-on: ${{ matrix.arch == 'arm64' && 'macos-latest' || 'macos-13' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt pyinstaller
      - run: python gen_icon.py
      - run: python build.py --arch ${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: CDNSpeedTest_macOS_${{ matrix.arch }}
          path: dist/CDNSpeedTest_${{ matrix.arch }}

  linux:
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt pyinstaller
      - run: python gen_icon.py
      - run: python build.py
      - uses: actions/upload-artifact@v4
        with:
          name: CDNSpeedTest_Linux_${{ matrix.arch }}
          path: dist/CDNSpeedTest_${{ matrix.arch }}
