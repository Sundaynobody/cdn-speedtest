name: Build CDNSpeedTest

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  windows:
    strategy:
      matrix:
        arch: [x86, x86_64]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: ${{ matrix.arch == 'x86' && 'x86' || 'x64' }}
      - run: pip install -r requirements.txt pyinstaller
      - run: python gen_icon.py
      - run: python build.py
      - uses: actions/upload-artifact@v4
        with:
          name: CDNSpeedTest_Windows_${{ matrix.arch }}
          path: dist/CDNSpeedTest_${{ matrix.arch }}.exe

  macos:
    strategy:
      matrix:
        arch: [arm64]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt pyinstaller
      - run: python gen_icon.py
      - run: python build.py --arch arm64
      - uses: actions/upload-artifact@v4
        with:
          name: CDNSpeedTest_macOS_arm64
          path: dist/CDNSpeedTest_arm64

  linux:
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt pyinstaller
      - run: python gen_icon.py
      - run: python build.py
      - run: if [ "${{ matrix.arch }}" = "aarch64" ]; then mv dist/CDNSpeedTest_arm64 dist/CDNSpeedTest_aarch64; fi
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: CDNSpeedTest_Linux_${{ matrix.arch }}
          path: dist/CDNSpeedTest_${{ matrix.arch }}

  android:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install buildozer
        run: |
          sudo apt update
          sudo apt install -y python3-pip openjdk-17-jdk autoconf automake cmake \
            libtool libltdl-dev pkg-config libssl-dev libffi-dev python3-dev zlib1g-dev
          pip install --user buildozer cython
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Build APK
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          java -version
          cd android
          buildozer android debug 2>&1 | tee build.log; rc=${PIPESTATUS[0]}
          echo "=== EXIT CODE: $rc ==="
          echo "=== ERROR MATCHES ==="
          grep -in -E "(error|failed|traceback|exception)" build.log || echo "(none)"
          exit $rc
      - uses: actions/upload-artifact@v4
        with:
          name: CDNSpeedTest_Android
          path: android/bin/*.apk

  release:
    needs: [windows, macos, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: CDNSpeedTest_*
          merge-multiple: true
          path: release/
      - run: ls -la release/
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
